<!doctype html><html lang='pt-BR'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Conhecendo o Tribunal — Organograma Interativo TCESP</title><style>:root{--ink:#0f172a;--muted:#64748b;--line:#cbd5e1;--bg:#eef3fb;--blue:#1d4ed8;--red:#ef4444}*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,Helvetica,sans-serif;background:linear-gradient(135deg,#f8fafc,#dbeafe);color:var(--ink);overflow:hidden}.topbar{position:fixed;inset:0 0 auto 0;height:72px;z-index:50;background:rgba(255,255,255,.94);backdrop-filter:blur(12px);border-bottom:1px solid #dbe3ef;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 18px}.brand{display:flex;align-items:center;gap:12px;min-width:300px}.brand img{height:44px;background:#0f172a;border-radius:12px;padding:5px}.brand h1{font-size:17px;margin:0;letter-spacing:-.02em}.brand span{display:block;color:#64748b;font-size:12px;margin-top:2px}.tools{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}.tools a,.tools button{height:36px;border:1px solid #cbd5e1;background:#fff;color:#334155;border-radius:12px;padding:0 11px;font-weight:850;font-size:12px;text-decoration:none;cursor:pointer}.tools a.main{background:#0f172a;color:#fff;border-color:#0f172a}.tools button:hover,.tools a:hover{border-color:#60a5fa;background:#eff6ff;color:#1d4ed8}.tools input{height:36px;width:240px;border:1px solid #cbd5e1;border-radius:12px;padding:0 12px;background:#fff;outline:none}.shell{position:fixed;left:0;right:0;top:72px;bottom:0;overflow:auto;cursor:grab;touch-action:none;background:radial-gradient(circle at 20px 20px,rgba(37,99,235,.08) 1px,transparent 1px);background-size:22px 22px}.shell.dragging{cursor:grabbing;user-select:none}.stage{position:relative}.canvas{position:absolute;left:0;top:0;transform-origin:0 0}.lines{position:absolute;inset:0;overflow:visible;pointer-events:none}.lines path{fill:none;stroke:#ef4444;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}.lines path.soft{stroke:#94a3b8;stroke-dasharray:5 5}.org-node{position:absolute;width:170px;min-height:58px;border:1.5px solid #cbd5e1;border-radius:15px;background:#fff;box-shadow:0 8px 18px rgba(15,23,42,.09);padding:9px 10px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:.15s;cursor:help}.org-node:hover{z-index:20;transform:translateY(-2px);box-shadow:0 18px 38px rgba(15,23,42,.20);border-color:#2563eb}.org-node h3{font-size:12.2px;line-height:1.15;margin:0;font-weight:900}.org-node p{font-size:10.2px;line-height:1.2;margin:0;color:#64748b}.org-node.small{width:126px;min-height:44px;border-radius:12px;padding:7px}.org-node.small h3{font-size:10.8px}.org-node.wide{width:220px}.org-node.tiny{width:78px;min-height:34px;padding:5px;border-radius:10px}.org-node.tiny h3{font-size:9.4px}.g-top{background:linear-gradient(135deg,#0f172a,#1d4ed8);color:#fff;border-color:#1d4ed8}.g-top p{color:#dbeafe}.g-delib{background:#eff6ff;border-color:#93c5fd}.g-admin{background:#ecfdf5;border-color:#86efac}.g-tech{background:#f0f9ff;border-color:#7dd3fc}.g-fisc{background:#fff7ed;border-color:#fdba74}.g-reg{background:#f5f3ff;border-color:#c4b5fd}.g-apoio{background:#f8fafc;border-color:#cbd5e1}.g-df{background:#fffbeb;border-color:#facc15}.subunits{display:flex;flex-wrap:wrap;gap:3px;justify-content:center;margin-top:3px}.subunits i{font-style:normal;font-size:8.8px;background:rgba(255,255,255,.75);border:1px solid rgba(100,116,139,.25);border-radius:999px;padding:2px 4px;color:#475569}.tip{position:fixed;z-index:100;display:none;max-width:310px;background:#0f172a;color:#fff;border:1px solid rgba(255,255,255,.18);border-radius:18px;box-shadow:0 24px 70px rgba(15,23,42,.35);padding:13px 14px;font-size:12px;line-height:1.45;pointer-events:none}.tip b{color:#bfdbfe}.tip .dir{display:block;margin-top:7px;padding-top:7px;border-top:1px solid rgba(255,255,255,.15)}.legend{position:fixed;left:14px;bottom:14px;z-index:40;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border:1px solid #dbe3ef;border-radius:18px;box-shadow:0 12px 30px rgba(15,23,42,.12);padding:10px;display:flex;gap:8px;flex-wrap:wrap;max-width:760px}.legend span{font-size:10.5px;border:1px solid #dbe3ef;border-radius:999px;padding:5px 8px;background:#fff;color:#334155}.dim .org-node{opacity:.22}.dim .org-node.hit{opacity:1;outline:4px solid rgba(37,99,235,.25)}@media(max-width:800px){.topbar{height:auto;align-items:flex-start;flex-direction:column}.shell{top:132px}.tools{justify-content:flex-start}.tools input{width:min(80vw,260px)}.legend{display:none}}</style></head><body><header class='topbar'><div class='brand'><img src='https://www.tce.sp.gov.br/sites/default/files/portal/logo_branco_300x100.png' alt='TCESP'><div><h1>Conhecendo o Tribunal</h1><span>Organograma interativo do TCESP</span></div></div><div class='tools'><a class='main' href='./index.html'>Mapa territorial</a><a href='https://www.tce.sp.gov.br/organograma' target='_blank' rel='noopener'>Organograma oficial</a><input id='search' placeholder='Buscar unidade, DF, UR...'><button id='zin'>+</button><button id='zout'>−</button><button id='reset'>Centralizar</button></div></header><main id='shell' class='shell'><div id='stage' class='stage'><div id='canvas' class='canvas'><svg id='svg' class='lines'></svg></div></div></main><div class='legend'><span>Azul: direção e deliberação</span><span>Verde: administração</span><span>Celeste: tecnologia</span><span>Laranja: fiscalização</span><span>Roxo: unidades regionais</span><span>Arraste com a mão para navegar</span></div><div id='tip' class='tip'></div><script>const W=3000,H=2200;const data=[['pleno','Tribunal Pleno','Órgão colegiado superior','g-top',1415,30,190,70,'Instância colegiada máxima de deliberação do Tribunal.',''],['cam1','Primeira Câmara','Colegiado de julgamento','g-delib',1030,170,180,62,'Órgão colegiado de deliberação e julgamento.',''],['pres','Presidência','Direção institucional','g-top',1415,170,190,70,'Conduz a direção institucional e administrativa superior do Tribunal.',''],['cam2','Segunda Câmara','Colegiado de julgamento','g-delib',1810,170,180,62,'Órgão colegiado de deliberação e julgamento.',''],['cart1','Cartório da 1ª Câmara','Apoio processual','g-delib',1030,280,180,58,'Apoio cartorário às atividades da Primeira Câmara.',''],['cart2','Cartório da 2ª Câmara','Apoio processual','g-delib',1810,280,180,58,'Apoio cartorário às atividades da Segunda Câmara.',''],['vice','Vice-Presidência','Apoio à Presidência','g-apoio',1270,310,170,58,'Apoia a condução institucional superior.',''],['corr','Corregedoria','Controle correcional','g-apoio',1475,310,170,58,'Atuação correcional e acompanhamento institucional.',''],['ouv','Ouvidoria','Atendimento ao cidadão','g-apoio',1680,310,170,58,'Canal institucional de comunicação com o cidadão e recebimento de manifestações.',''],['ctrl','Controladoria','Controle interno','g-apoio',1885,310,170,58,'Apoia controles internos e acompanhamento da gestão institucional.',''],['gtp','GTP','Gabinete Técnico da Presidência','g-apoio',1055,430,170,58,'Apoio técnico à Presidência.',''],['epcp','EPCP','Escola Paulista de Contas Públicas','g-apoio',850,430,170,58,'Promove capacitação, formação e difusão de conhecimento em controle externo.',''],['gabcons','Gabinetes de Conselheiros','Apoio aos Conselheiros','g-delib',1265,430,180,58,'Apoio técnico e administrativo aos gabinetes dos Conselheiros.',''],['gabsub','Auditores Substitutos','Gabinetes','g-delib',1475,430,180,58,'Gabinetes de Auditores substitutos de Conselheiro.',''],['mpc','MPC junto ao TCESP','Ministério Público de Contas','g-delib',1685,430,180,58,'Atuação ministerial junto ao Tribunal de Contas.',''],['dga','DGA','Departamento Geral da Administração','g-admin',360,610,220,70,'Coordena a gestão administrativa interna, recursos, finanças, contratos, materiais e serviços.',''],['dti','DTI','Departamento de Tecnologia da Informação','g-tech',690,610,220,70,'Cuida de infraestrutura, sistemas, segurança da informação e suporte tecnológico.',''],['sdg','SDG','Secretaria-Diretoria Geral','g-fisc',1415,610,220,70,'Organiza apoio técnico, processual e de fiscalização vinculado à atividade fim.',''],['dga1','Gestão de Pessoas','DRH / pessoal','g-admin',90,770,150,54,'Administra rotinas de pessoal e apoio à gestão de servidores.',''],['dga2','Finanças e Contabilidade','DCF','g-admin',260,770,150,54,'Cuida de rotinas financeiras, contábeis e orçamentárias internas.',''],['dga3','Materiais e Patrimônio','DMAT','g-admin',430,770,150,54,'Gerencia materiais, patrimônio e suprimentos.',''],['dga4','Contratos e Projetos','DCON / projetos','g-admin',600,770,150,54,'Apoia contratos, obras, projetos e serviços administrativos.',''],['dga5','Saúde e Serviços','DSA / DES','g-admin',770,770,150,54,'Apoia assistência à saúde, serviços gerais e infraestrutura.',''],['dti1','DTEC','Infraestrutura','g-tech',610,910,150,54,'Gerencia infraestrutura tecnológica e ambiente técnico.',''],['dti2','DSIS','Sistemas','g-tech',780,910,150,54,'Desenvolve e mantém sistemas corporativos.',''],['dti3','DSEG','Segurança','g-tech',950,910,150,54,'Atua em segurança da informação e proteção tecnológica.',''],['jur','Jurisprudência','Pesquisa e organização','g-fisc',1135,770,150,54,'Organiza e apoia a consulta à jurisprudência do Tribunal.',''],['pauta','Pauta e Taquigrafia','Sessões','g-fisc',1305,770,150,54,'Apoia pauta, registros e atos das sessões.',''],['dipe','DIPE','Apoio técnico/processual','g-fisc',1475,770,150,54,'Apoia rotinas técnicas e processuais da Secretaria-Diretoria Geral.',''],['audesp','AUDESP','Dados dos jurisdicionados','g-fisc',1645,770,150,54,'Processa dados eletrônicos dos jurisdicionados para subsidiar a fiscalização.',''],['dsf1','DSF-1','Supervisão da Fiscalização','g-fisc',1010,940,190,66,'Supervisiona diretorias e unidades de fiscalização vinculadas ao seu bloco.','Paulo Massaru Uesugi Sugiura'],['dsf2','DSF-2','Supervisão da Fiscalização','g-fisc',1820,940,190,66,'Supervisiona diretorias e unidades de fiscalização vinculadas ao seu bloco.','Alexandre Teixeira Carsola'],['dcg','DCG','Contas do Governador','g-fisc',1420,940,190,66,'Diretoria de fiscalização das Contas do Governador.','Renata Luciana dos Reis Magalhães'],['naec','NAEC','Apoio estratégico','g-fisc',1220,1070,160,54,'Núcleo de apoio e coordenação técnica da fiscalização.',''],['cofisco','COFISCO','Coordenação fiscalizatória','g-fisc',1620,1070,160,54,'Apoio de coordenação e articulação técnica das ações fiscalizatórias.',''],['dsf11','DSF-1.1','Eixo das DFs','g-fisc',740,1110,160,54,'Ramo de fiscalização vinculado ao DSF-1.',''],['dsf21','DSF-2.1','Eixo das DFs','g-fisc',2040,1110,160,54,'Ramo de fiscalização vinculado ao DSF-2.',''],['urs1','UR-01 a UR-10','Regionais vinculadas','g-reg',470,1510,180,58,'Bloco das primeiras unidades regionais descentralizadas.',''],['urs2','UR-11 a UR-20','Regionais vinculadas','g-reg',2130,1510,180,58,'Bloco das unidades regionais descentralizadas do segundo bloco.','']];const dfs=[['df1','DF-1','Gabriel Marchi da Silva',380],['df2','DF-2','Cláudio Balmant',560],['df3','DF-3','Adelino Detofol',740],['df4','DF-4','Audria Lucine Martins de Souza',920],['df5','DF-5','Honormélio Pereira da Silveira',1100],['df6','DF-6','Silvia Cristina Ferreira Costa',1680],['df7','DF-7','Elias Santos Ferreira',1860],['df8','DF-8','Fernando Sampaio Bezerra',2040],['df9','DF-9','Pedro de Castro Rubio Poli',2220],['df10','DF-10','Roberta Azola Gardelli',2400]];dfs.forEach((d,i)=>data.push([d[0],d[1],'Diretoria de Fiscalização','g-df',d[3],1260,150,72,'Fiscaliza órgãos e entidades sob sua área de atuação, conforme distribuição interna do Tribunal.',d[2],'dfsubs']));const urs=[['UR-01','Araçatuba','Amanda Vieira Pinto da Silva'],['UR-02','Bauru','Luciano Teixeira Savioli'],['UR-03','Campinas','Ana Cristina Okumura'],['UR-04','Marília','Agnon Ribeiro de Lima'],['UR-05','Presidente Prudente','Marcio Eduardo P. Fernandes'],['UR-06','Ribeirão Preto','Flávio Henrique Pastre'],['UR-07','São José dos Campos','Cibele de Lima Z. Martinusso'],['UR-08','São José do Rio Preto','Namir Antonio Neves'],['UR-09','Sorocaba','Mauro Guimarães Coam'],['UR-10','Araras','Paulo Cesar Silva Alvarenga'],['UR-11','Fernandópolis','Denis Cassio Gabriel'],['UR-12','Registro','Rodrigo Corrêa da Costa Oliveira'],['UR-13','Araraquara','Marcelo Zaccaro'],['UR-14','Guaratinguetá','Francisco José Pupo Nogueira Filho'],['UR-15','Andradina','Thaís Albani dos Santos'],['UR-16','Itapeva','Camila Simão Costa'],['UR-17','Ituverava','Rodrigo Marques Rodrigues'],['UR-18','Adamantina','Robson Luis Correia'],['UR-19','Mogi Guaçu','Vanderlei Marçola'],['UR-20','Santos','Rafael Ribeiro Calegari Gomes']];urs.forEach((u,i)=>{const left=i<10?70+i*150:1550+(i-10)*150;const top=i<10?1650:1650;data.push(['ur'+(i+1),u[0],u[1],'g-reg small',left,top,130,58,'Sede regional descentralizada de fiscalização e apoio operacional do TCESP.',u[2]])});const edges=[['pleno','cam1'],['pleno','pres'],['pleno','cam2'],['cam1','cart1'],['cam2','cart2'],['pres','vice'],['pres','corr'],['pres','ouv'],['pres','ctrl'],['pres','gtp'],['pres','epcp'],['pres','gabcons'],['pres','gabsub'],['pres','mpc'],['pres','dga'],['pres','dti'],['pres','sdg'],['dga','dga1'],['dga','dga2'],['dga','dga3'],['dga','dga4'],['dga','dga5'],['dti','dti1'],['dti','dti2'],['dti','dti3'],['sdg','jur'],['sdg','pauta'],['sdg','dipe'],['sdg','audesp'],['sdg','dsf1'],['sdg','dcg'],['sdg','dsf2'],['dsf1','naec'],['dsf2','cofisco'],['dsf1','dsf11'],['dsf2','dsf21'],['dsf11','df1'],['dsf11','df2'],['dsf11','df3'],['dsf11','df4'],['dsf11','df5'],['dsf21','df6'],['dsf21','df7'],['dsf21','df8'],['dsf21','df9'],['dsf21','df10'],['dsf1','urs1'],['dsf2','urs2']];for(let i=1;i<=10;i++)edges.push(['urs1','ur'+i]);for(let i=11;i<=20;i++)edges.push(['urs2','ur'+i]);const shell=document.getElementById('shell'),stage=document.getElementById('stage'),canvas=document.getElementById('canvas'),svg=document.getElementById('svg'),tip=document.getElementById('tip');let z=.82;function setZoom(v){z=Math.max(.42,Math.min(1.55,v));stage.style.width=W*z+'px';stage.style.height=H*z+'px';canvas.style.width=W+'px';canvas.style.height=H+'px';canvas.style.transform='scale('+z+')';svg.setAttribute('width',W);svg.setAttribute('height',H)}function nodeHtml(n){let subs='';if(n[11]==='dfsubs'){let k=n[1].replace('DF-','');subs='<div class=subunits><i>DF-'+k+'.1</i><i>DF-'+k+'.2</i><i>DF-'+k+'.3</i><i>DF-'+k+'.4</i></div>'}return `<div class='org-node ${n[3]}' data-id='${n[0]}' data-desc='${n[8]||''}' data-dir='${n[9]||''}' style='left:${n[4]}px;top:${n[5]}px;width:${n[6]}px;min-height:${n[7]}px'><h3>${n[1]}</h3><p>${n[2]||''}</p>${subs}</div>`}canvas.insertAdjacentHTML('beforeend',data.map(nodeHtml).join(''));function box(id){const el=document.querySelector(`[data-id='${id}']`);return{x:parseFloat(el.style.left),y:parseFloat(el.style.top),w:el.offsetWidth,h:el.offsetHeight}}function connect(a,b,soft=false){const A=box(a),B=box(b);let x1=A.x+A.w/2,y1=A.y+A.h,x2=B.x+B.w/2,y2=B.y,mid=y1+(y2-y1)/2;const p=document.createElementNS('http://www.w3.org/2000/svg','path');p.setAttribute('d',`M${x1},${y1} V${mid} H${x2} V${y2}`);if(soft)p.setAttribute('class','soft');svg.appendChild(p)}edges.forEach(e=>connect(e[0],e[1]));document.querySelectorAll('.org-node').forEach(n=>{n.addEventListener('mouseenter',ev=>{const d=n.dataset.desc||'',dir=n.dataset.dir||'';tip.innerHTML='<b>'+n.querySelector('h3').textContent+'</b><br>'+d+(dir?'<span class=dir><b>Diretor(a):</b> '+dir+'</span>':'');tip.style.display='block'});n.addEventListener('mousemove',ev=>{tip.style.left=Math.min(innerWidth-330,ev.clientX+16)+'px';tip.style.top=Math.min(innerHeight-160,ev.clientY+16)+'px'});n.addEventListener('mouseleave',()=>tip.style.display='none')});let drag=false,sx=0,sy=0,sl=0,st=0;shell.addEventListener('pointerdown',e=>{if(e.target.closest('.org-node')||e.target.closest('button')||e.target.closest('input')||e.target.closest('a'))return;drag=true;shell.classList.add('dragging');shell.setPointerCapture(e.pointerId);sx=e.clientX;sy=e.clientY;sl=shell.scrollLeft;st=shell.scrollTop});shell.addEventListener('pointermove',e=>{if(!drag)return;shell.scrollLeft=sl-(e.clientX-sx);shell.scrollTop=st-(e.clientY-sy)});shell.addEventListener('pointerup',e=>{drag=false;shell.classList.remove('dragging')});shell.addEventListener('wheel',e=>{if(!e.ctrlKey&&!e.metaKey)return;e.preventDefault();setZoom(z+(e.deltaY<0?.07:-.07))},{passive:false});document.getElementById('zin').onclick=()=>setZoom(z+.08);document.getElementById('zout').onclick=()=>setZoom(z-.08);document.getElementById('reset').onclick=()=>{setZoom(.82);setTimeout(()=>shell.scrollTo({left:220,top:0,behavior:'smooth'}),30)};document.getElementById('search').addEventListener('input',e=>{const q=e.target.value.trim().toLowerCase();canvas.classList.toggle('dim',!!q);document.querySelectorAll('.org-node').forEach(n=>{n.classList.toggle('hit',!!q&&n.textContent.toLowerCase().includes(q))})});setZoom(.82);setTimeout(()=>shell.scrollTo({left:220,top:0,behavior:'auto'}),80);</script></body></html>
