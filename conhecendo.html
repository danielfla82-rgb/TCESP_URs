<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Carregando organograma TCESP v7</title>
  <style>
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f1f5f9;color:#0f172a;display:grid;place-items:center;height:100vh}
    .box{background:white;border:1px solid #cbd5e1;border-radius:18px;padding:22px;box-shadow:0 16px 45px rgba(15,23,42,.12);max-width:520px;text-align:center}
    .box p{color:#64748b;margin:8px 0 0}.bar{height:6px;background:#e2e8f0;border-radius:999px;overflow:hidden;margin-top:14px}.bar i{display:block;height:100%;width:45%;background:#1d4ed8;border-radius:999px;animation:load 1s infinite alternate}@keyframes load{from{transform:translateX(-60%)}to{transform:translateX(180%)}}
  </style>
</head>
<body>
<div class="box"><b>Carregando organograma aprovado v7...</b><p>Conhecendo o Tribunal — DFs sem linhas soltas.</p><div class="bar"><i></i></div></div>
<script>
(async()=>{
  const v='20260703-v7fix';
  const files=[
    'conhecendo_v7_exact/part00.txt','conhecendo_v7_exact/part01.txt','conhecendo_v7_exact/part02.txt','conhecendo_v7_exact/part03.txt','conhecendo_v7_exact/part04.txt','conhecendo_v7_exact/part05.txt','conhecendo_v7_exact/part06.txt','conhecendo_v7_exact/part07.txt','conhecendo_v7_exact/part08.txt','conhecendo_v7_exact/part09.txt','conhecendo_v7_exact/part10.txt','conhecendo_v7_exact/part11.txt','conhecendo_v7_exact/part12.txt','conhecendo_v7_exact/part13.txt','conhecendo_v7_exact/part14s0.txt','conhecendo_v7_exact/part14s1.txt','conhecendo_v7_exact/part14s2a.txt','conhecendo_v7_exact/part14s2b.txt','conhecendo_v7_exact/part14s3.txt','conhecendo_v7_exact/part14s4a.txt','conhecendo_v7_exact/part14s4b.txt','conhecendo_v7_exact/part15a.txt','conhecendo_v7_exact/part15b.txt','conhecendo_v7_exact/part16a.txt','conhecendo_v7_exact/part16b.txt'
  ];
  const parts=await Promise.all(files.map(async f=>{const r=await fetch(f+'?v='+v); if(!r.ok) throw new Error(f+' HTTP '+r.status); return await r.text();}));
  let html=parts.join('');
  html=html.replace('</p"><div class="meta"><strong>Diretor(a): </strong>Denis Cassio Gabriel','</p><div class="meta"><strong>Diretor(a): </strong>Denis Cassio Gabriel');
  document.open();document.write(html);document.close();
})().catch(err=>{document.body.innerHTML='<div class="box"><b>Erro ao carregar a versão aprovada v7</b><p>'+String(err.message||err)+'</p></div>';});
</script>
</body>
</html>
